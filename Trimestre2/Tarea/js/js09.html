<!DOCTYPE html>
<html>
<head>
<script>

function muestra() {
    f = document.getElementById("tbf").value;
    c = toCelsius(f)
    document.getElementById("tbc").value = c;
}
function muestra2() {
    c2 = document.getElementById("tbc2").value;
    f2 = toCelsius(c2)
    document.getElementById("tbf2").value = f2;
}

function toCelsius(f) {
  return (5/9) * (f-32);
}
function toFahrenheit(c) {
  return (c * 9/5) + 32;
}
</script>
</head>
<body>

<h2>JavaScript Functions</h2>

<p>This example calls a function to convert from Fahrenheit to Celsius:</p>
<label for="tbf">Fahrenheit : </label>
<input type="text" id="tbf" name="tbf"> 
<br>
<label for="tbc">Celcius : </label>
<input type="text" id="tbc" name="tbc"> 
<br>
<button type="button" onclick="muestra()">Convierte</button> 
<p>This example calls a function to convert from Celsius to Farenheit:</p>
<label for="tbf2">Farenheit : </label>
<input type="text" id="tbf2" name="tbf2"> 
<br>
<label for="tbc2">Celsius : </label>
<input type="text" id="tbc2" name="tbc2"> 
<br>
<button type="button" onclick="muestra2()">Convierte</button> 
</body>
</html>
